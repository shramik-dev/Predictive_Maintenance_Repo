name: Predictive Maintenance Pipeline

on:
  p1:
    branches:
      - main   # Trigger on push to main branch

jobs:

  # ----------------------------
  # 1. Register Dataset
  # ----------------------------
  register-dataset:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r Predictive_Maintenance_Project/deployment/requirements.txt

      - name: Verify dataset folder
        run: |
          echo "Current working directory: $(pwd)"
          ls -R Predictive_Maintenance_Project || true

      - name: Upload Dataset to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Predictive_Maintenance_Project/model_building/data_register.py


  # ----------------------------
  # 2. Data Preparation
  # ----------------------------
  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r Predictive_Maintenance_Project/deployment/requirements.txt

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Predictive_Maintenance_Project/model_building/prep.py


  # ----------------------------
  # 3. Model Training
  # ----------------------------
  model-training:
    needs: data-prep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r Predictive_Maintenance_Project/deployment/requirements.txt

      - name: Start MLflow Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &
          sleep 5

      - name: Train Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Predictive_Maintenance_Project/model_building/train.py


  # ----------------------------
  # 4. Deploy to Hugging Face Space
  # ----------------------------
  deploy-hosting:
    needs: [register-dataset, data-prep, model-training]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r Predictive_Maintenance_Project/deployment/requirements.txt

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Predictive_Maintenance_Project/hosting/hosting.py
